<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - PromoForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="flex min-h-screen">
  <header class="md:hidden w-full fixed top-0 left-0 bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center z-50">
    <span class="font-black text-sm text-cyan-400">PROMOFORGE CONTROL</span>
    <button id="burger-btn" class="text-white focus:outline-none text-xl">☰</button>
  </header>

  <aside id="sidebar" class="w-64 glass-card border-r border-gray-800 p-6 flex flex-col justify-between fixed md:sticky top-0 h-screen z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out pt-20 md:pt-6">
    <div class="space-y-8">
      <div class="hidden md:block font-black text-lg text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">⚡ ADMIN SYSTEM</div>
      <nav class="flex flex-col gap-2 text-sm">
        <a href="dashboard.html" class="bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-4 py-2.5 rounded-lg font-bold">Dashboard Summary</a>
        <a href="produk.html" class="text-gray-400 hover:bg-gray-800 px-4 py-2.5 rounded-lg transition">Kelola Produk (CRUD)</a>
        <a href="promosi.html" class="text-gray-400 hover:bg-gray-800 px-4 py-2.5 rounded-lg transition">Kelola Promosi (CRUD)</a>
        <a href="laporan.html" class="text-gray-400 hover:bg-gray-800 px-4 py-2.5 rounded-lg transition">Laporan Grafik</a>
      </nav>
    </div>
    <button class="w-full text-left text-xs text-red-400 font-bold border border-red-500/20 hover:bg-red-500/10 p-2 rounded-lg transition"><a href="../index.html">✕ Log Out Sistem</a></button>
  </aside>

  <main class="flex-1 p-6 md:p-10 mt-16 md:mt-0 max-w-7xl mx-auto w-full">
    <h1 class="text-2xl font-black text-white">Ringkasan Sistem</h1>
    <p class="text-xs text-gray-400 mt-1">Status database virtual berbasis Google Sheets saat ini.</p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
      <div class="glass-card p-6 rounded-xl border border-gray-800 flex items-center justify-between">
        <div>
          <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total Unit Produk</p>
          <p id="dash-prod-count" class="text-3xl font-black text-white mt-1">...</p>
        </div>
        <div class="text-2xl p-3 bg-cyan-500/10 text-cyan-400 rounded-lg">📦</div>
      </div>
      <div class="glass-card p-6 rounded-xl border border-gray-800 flex items-center justify-between">
        <div>
          <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Total Kampanye Promosi</p>
          <p id="dash-promo-count" class="text-3xl font-black text-white mt-1">...</p>
        </div>
        <div class="text-2xl p-3 bg-purple-500/10 text-purple-400 rounded-lg">🔥</div>
      </div>
      <div class="glass-card p-6 rounded-xl border border-gray-800 flex items-center justify-between col-span-1 sm:col-span-2 lg:col-span-1">
        <div>
          <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">Status API Database</p>
          <p class="text-sm font-bold text-teal-400 mt-2 flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-teal-400 animate-ping"></span> ONLINE (GAS)
          </p>
        </div>
        <div class="text-2xl p-3 bg-teal-500/10 text-teal-400 rounded-lg">⚡</div>
      </div>
    </div>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/api.js"></script>
  <script>
    Auth.checkAuth();
    
    // Burger handler
    const burger = document.getElementById("burger-btn");
    const sidebar = document.getElementById("sidebar");
    burger.addEventListener("click", () => sidebar.classList.toggle("-translate-x-full"));

    async function fetchStats() {
      const [promosi, produk] = await Promise.all([API.get("getPromosi"), API.get("getProduk")]);
      document.getElementById("dash-prod-count").innerText = (produk || []).length;
      document.getElementById("dash-promo-count").innerText = (promosi || []).length;
    }
    fetchStats();
  </script>
</body>
</html>
