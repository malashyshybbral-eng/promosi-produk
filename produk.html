<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk - PromoForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="glass-card sticky top-0 z-40 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
    <div class="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">⚡ PROMOFORGE</div>
    <div class="flex gap-6 text-sm font-medium text-gray-300">
      <a href="index.html" class="hover:text-cyan-400">Home</a>
      <a href="produk.html" class="text-cyan-400">Produk</a>
      <a href="promosi.html" class="hover:text-cyan-400">Promosi</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
      <div>
        <h1 class="text-2xl font-bold text-white">Semua Katalog Produk</h1>
        <p class="text-xs text-gray-400 mt-1">Cari produk premium favorit Anda secara instan</p>
      </div>
      <input type="text" id="search-input" placeholder="Cari nama produk..." class="glass-card w-full md:w-80 px-4 py-2.5 rounded-lg border border-gray-700 focus:outline-none focus:border-cyan-500 text-sm text-gray-200">
    </div>

    <div id="produk-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4"></div>
  </main>

  <script src="js/shared.js"></script>
  <script src="js/api.js"></script>
  <script>
    let allProducts = [];
    async function loadProduk() {
      const grid = document.getElementById("produk-grid");
      grid.innerHTML = createCardSkeleton().repeat(4);
      allProducts = await API.get("getProduk") || [];
      renderProducts(allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById("produk-grid");
      grid.innerHTML = "";
      if(products.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">Produk tidak ditemukan.</div>`;
        return;
      }
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "glass-card rounded-xl overflow-hidden flex flex-col justify-between border border-gray-800";
        card.innerHTML = `
          <div class="aspect-square bg-gray-900 overflow-hidden">
            <img src="${p.gambar}" class="w-full h-full object-cover" loading="lazy">
          </div>
          <div class="p-4 flex-1 flex flex-col justify-between">
            <div>
              <h3 class="font-bold text-sm text-white line-clamp-1">${p.nama_produk}</h3>
              <p class="text-xs text-gray-400 mt-1 line-clamp-2">${p.deskripsi}</p>
            </div>
            <div class="mt-4 pt-3 border-t border-gray-800/80">
              <span class="text-xs font-medium text-gray-500">Harga Terbuka</span>
              <p class="text-sm font-bold text-cyan-400">Rp ${Number(p.harga).toLocaleString('id-ID')}</p>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById("search-input").addEventListener("input", (e) => {
      const keyword = e.target.value.toLowerCase();
      const filtered = allProducts.filter(p => p.nama_produk.toLowerCase().includes(keyword));
      renderProducts(filtered);
    });

    loadProduk();
  </script>
</body>
</html>
